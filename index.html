<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数学可视化 - 具象理解数学之美</title>
<style>
/* ============ CSS Variables & Reset ============ */
:root {
  --bg-page: #f0f2f5;
  --bg-panel: #ffffff;
  --bg-card: #f7f8fa;
  --bg-hover: #eef0f5;
  --border: #e0e3e8;
  --border-active: #4c6ef5;
  --text-primary: #1a1d26;
  --text-secondary: #5a6070;
  --text-muted: #9ca3af;
  --accent: #4c6ef5;
  --accent-glow: rgba(76, 110, 245, 0.25);
  --accent-light: #748ffc;
  --accent-dark: #364fc7;
  --accent-bg: rgba(76, 110, 245, 0.08);
  --cyan: #0ca5b0;
  --cyan-bg: rgba(12, 165, 176, 0.08);
  --green: #2b9e44;
  --green-bg: rgba(43, 158, 68, 0.1);
  --red: #e03131;
  --red-bg: rgba(224, 49, 49, 0.08);
  --radius: 12px;
  --radius-sm: 8px;
  --radius-lg: 16px;
  --transition: 200ms ease;
  --font-mono: 'Cascadia Code', 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
  --font-sans: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
  --shadow-lg: 0 12px 32px rgba(0,0,0,0.1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-sans);
  background: var(--bg-page);
  color: var(--text-primary);
  overflow: hidden;
  height: 100vh;
  width: 100vw;
  user-select: none;
}

/* ============ Layout ============ */
#app {
  display: flex;
  height: 100vh;
  width: 100vw;
}

/* ============ Sidebar ============ */
#sidebar {
  width: 280px;
  min-width: 280px;
  background: var(--bg-panel);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  z-index: 10;
  transition: transform var(--transition);
}

.sidebar-header {
  padding: 28px 24px 20px;
  border-bottom: 1px solid var(--border);
}

.sidebar-logo {
  display: flex;
  align-items: center;
  gap: 12px;
}

.sidebar-logo .icon-wrapper {
  width: 42px;
  height: 42px;
  background: linear-gradient(135deg, var(--accent), var(--accent-dark));
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 16px var(--accent-glow);
}

.sidebar-logo svg {
  width: 24px;
  height: 24px;
  fill: none;
  stroke: #fff;
  stroke-width: 2;
}

.sidebar-logo h1 {
  font-size: 1.15rem;
  font-weight: 700;
  letter-spacing: -0.01em;
  color: var(--text-primary);
}

.sidebar-logo span.sub {
  display: block;
  font-size: 0.7rem;
  font-weight: 400;
  color: var(--text-muted);
  margin-top: 1px;
}

.sidebar-nav {
  flex: 1;
  padding: 16px 12px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.nav-section-label {
  font-size: 0.68rem;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  padding: 12px 12px 6px;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all var(--transition);
  color: var(--text-secondary);
  font-size: 0.9rem;
  font-weight: 500;
  position: relative;
}

.nav-item:hover {
  background: var(--bg-hover);
  color: var(--text-primary);
}

.nav-item.active {
  background: var(--accent-bg);
  color: var(--accent);
  box-shadow: inset 0 0 0 1px rgba(76, 110, 245, 0.15);
}

.nav-item.active::before {
  content: '';
  position: absolute;
  left: 0;
  top: 50%;
  transform: translateY(-50%);
  width: 3px;
  height: 20px;
  background: var(--accent);
  border-radius: 0 3px 3px 0;
}

.nav-item svg {
  width: 18px;
  height: 18px;
  flex-shrink: 0;
}

.nav-item .badge {
  margin-left: auto;
  font-size: 0.65rem;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 10px;
  background: var(--accent-bg);
  color: var(--accent);
}

.sidebar-footer {
  padding: 16px 24px;
  border-top: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.btn-api {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 10px 16px;
  border-radius: var(--radius-sm);
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  font-size: 0.82rem;
  cursor: pointer;
  transition: all var(--transition);
  font-family: var(--font-sans);
}

.btn-api:hover {
  background: var(--bg-hover);
  border-color: var(--accent);
  color: var(--accent);
}

.btn-api svg {
  width: 16px;
  height: 16px;
}

.api-status {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 0.7rem;
  color: var(--text-muted);
}

.api-status .dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--text-muted);
}

.api-status .dot.connected {
  background: var(--green);
  box-shadow: 0 0 8px rgba(43, 158, 68, 0.4);
}

/* ============ Main Area ============ */
#main-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  position: relative;
  min-width: 0;
}

/* ============ Viewport ============ */
#viewport {
  flex: 1;
  position: relative;
  background: linear-gradient(135deg, #f8f9fc 0%, #edf0f7 50%, #f0f3fa 100%);
  cursor: grab;
  overflow: hidden;
}

#viewport:active { cursor: grabbing; }
#viewport.grabbing { cursor: grabbing; }

#three-canvas {
  display: block;
  width: 100%;
  height: 100%;
}

#two-d-canvas {
  display: block;
  width: 100%;
  height: 100%;
}

.hidden-canvas { display: none !important; }

.viewport-overlay {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  pointer-events: none;
  opacity: 0;
  transition: opacity 300ms ease;
  z-index: 20;
}

.viewport-overlay.visible {
  opacity: 1;
  pointer-events: auto;
}

.overlay-bg {
  position: absolute;
  inset: 0;
  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(4px);
}

.overlay-content {
  position: relative;
  z-index: 1;
  text-align: center;
}

.loader-spinner {
  width: 48px;
  height: 48px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 16px;
}

@keyframes spin { to { transform: rotate(360deg); } }

.loader-text {
  font-size: 0.9rem;
  color: var(--text-secondary);
  animation: pulse 2s ease infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 0.6; }
  50% { opacity: 1; }
}

/* Empty state prompt */
.empty-prompt {
  position: absolute;
  bottom: 120px;
  left: 50%;
  transform: translateX(-50%);
  text-align: center;
  pointer-events: none;
  transition: opacity 400ms ease;
  z-index: 5;
}

.empty-prompt.hidden { opacity: 0; }

.empty-prompt .big-icon {
  font-size: 3rem;
  margin-bottom: 12px;
  opacity: 0.4;
}

.empty-prompt p {
  font-size: 0.85rem;
  color: var(--text-muted);
  line-height: 1.6;
  max-width: 320px;
}

/* Viewport top bar */
.viewport-topbar {
  position: absolute;
  top: 16px;
  right: 16px;
  display: flex;
  gap: 8px;
  z-index: 15;
}

.vp-btn {
  width: 36px;
  height: 36px;
  border-radius: var(--radius-sm);
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(10px);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition);
  box-shadow: var(--shadow-sm);
}

.vp-btn:hover {
  background: #fff;
  border-color: var(--accent);
  color: var(--accent);
  box-shadow: var(--shadow-md);
}

.vp-btn svg {
  width: 16px;
  height: 16px;
}

/* Example chips */
.example-chips {
  position: absolute;
  bottom: 16px;
  right: 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  z-index: 5;
}

.chip-label {
  font-size: 0.65rem;
  font-weight: 600;
  color: var(--text-muted);
  text-align: right;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

.chip {
  padding: 6px 14px;
  border-radius: 20px;
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(10px);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  font-size: 0.75rem;
  cursor: pointer;
  transition: all var(--transition);
  font-family: var(--font-sans);
  text-align: right;
  white-space: nowrap;
  box-shadow: var(--shadow-sm);
}

.chip:hover {
  background: #fff;
  border-color: var(--accent);
  color: var(--accent);
  transform: translateX(-4px);
  box-shadow: var(--shadow-md);
}

/* ============ Question Banner ============ */
.question-banner {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  z-index: 14;
  background: linear-gradient(135deg, #eef1ff 0%, #f0f3ff 100%);
  border-bottom: 1px solid var(--border);
  padding: 10px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  pointer-events: none;
}
.question-banner .qb-icon { font-size: 1.2rem; flex-shrink: 0; }
.question-banner .qb-text { font-size: 0.9rem; font-weight: 600; color: var(--text-primary); flex: 1; }
.question-banner .qb-badge {
  font-size: 0.65rem; padding: 3px 10px; border-radius: 10px;
  background: var(--accent-bg); color: var(--accent); white-space: nowrap;
}

/* ============ 2D Step Controls ============ */
.step-controls {
  position: absolute;
  top: 52px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  align-items: center;
  gap: 12px;
  z-index: 15;
  background: rgba(255,255,255,0.95);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 8px 16px;
  box-shadow: var(--shadow-sm);
}

.step-controls .step-btn {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: #fff;
  color: var(--text-secondary);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition);
  font-size: 1rem;
}

.step-controls .step-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
}

.step-controls .step-btn:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}

.step-controls .step-info {
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--text-primary);
  min-width: 80px;
  text-align: center;
}

.step-controls .step-desc {
  font-size: 0.8rem;
  color: var(--text-secondary);
  max-width: 300px;
  text-align: center;
}

/* ============ Input Bar ============ */
#input-bar {
  height: 90px;
  min-height: 90px;
  background: var(--bg-panel);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 12px;
  z-index: 10;
}

#input-bar textarea {
  flex: 1;
  height: 46px;
  max-height: 46px;
  padding: 12px 18px;
  border-radius: 24px;
  background: var(--bg-page);
  border: 1px solid var(--border);
  color: var(--text-primary);
  font-size: 0.88rem;
  font-family: var(--font-sans);
  resize: none;
  outline: none;
  transition: all var(--transition);
  line-height: 1.4;
}

#input-bar textarea:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-bg);
}

#input-bar textarea::placeholder {
  color: var(--text-muted);
}

.btn-send {
  width: 46px;
  height: 46px;
  min-width: 46px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--accent-dark));
  border: none;
  color: #fff;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition);
  box-shadow: 0 4px 16px var(--accent-glow);
}

.btn-send:hover {
  transform: scale(1.08);
  box-shadow: 0 6px 24px var(--accent-glow);
}

.btn-send:active {
  transform: scale(0.96);
}

.btn-send:disabled {
  opacity: 0.4;
  cursor: not-allowed;
  transform: none;
  box-shadow: none;
}

.btn-send svg {
  width: 20px;
  height: 20px;
}

.btn-clear {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-muted);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition);
  flex-shrink: 0;
}

.btn-clear:hover {
  border-color: var(--text-muted);
  color: var(--text-secondary);
}

.btn-clear svg {
  width: 16px;
  height: 16px;
}

/* ============ Toast ============ */
.toast {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(-120px);
  padding: 12px 24px;
  border-radius: var(--radius-sm);
  background: var(--bg-panel);
  border: 1px solid var(--border);
  color: var(--text-primary);
  font-size: 0.85rem;
  z-index: 1000;
  transition: transform 300ms cubic-bezier(0.175, 0.885, 0.32, 1.275);
  box-shadow: var(--shadow-lg);
  display: flex;
  align-items: center;
  gap: 10px;
}

.toast.show { transform: translateX(-50%) translateY(0); }

.toast.error { border-color: var(--red); background: var(--red-bg); }
.toast.success { border-color: var(--green); background: var(--green-bg); }
.toast.info { border-color: var(--cyan); background: var(--cyan-bg); }

.toast .toast-icon {
  width: 20px;
  height: 20px;
  flex-shrink: 0;
}

/* ============ Modal ============ */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.3);
  backdrop-filter: blur(6px);
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 300ms ease;
}

.modal-overlay.open {
  opacity: 1;
  pointer-events: auto;
}

.modal {
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 32px;
  width: 460px;
  max-width: 90vw;
  box-shadow: var(--shadow-lg);
  transform: translateY(20px);
  transition: transform 300ms ease;
}

.modal-overlay.open .modal { transform: translateY(0); }

.modal h3 {
  font-size: 1.1rem;
  font-weight: 700;
  margin-bottom: 6px;
}

.modal .desc {
  font-size: 0.82rem;
  color: var(--text-secondary);
  margin-bottom: 20px;
  line-height: 1.5;
}

.form-group {
  margin-bottom: 16px;
}

.form-group label {
  display: block;
  font-size: 0.78rem;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

.form-group select,
.form-group input {
  width: 100%;
  padding: 10px 14px;
  border-radius: var(--radius-sm);
  background: var(--bg-page);
  border: 1px solid var(--border);
  color: var(--text-primary);
  font-size: 0.88rem;
  font-family: var(--font-mono);
  outline: none;
  transition: border-color var(--transition);
}

.form-group select:focus,
.form-group input:focus {
  border-color: var(--accent);
}

.form-group select { font-family: var(--font-sans); }

.form-hint {
  font-size: 0.7rem;
  color: var(--text-muted);
  margin-top: 4px;
}

.form-hint a {
  color: var(--accent);
  text-decoration: none;
}

.form-hint a:hover { text-decoration: underline; }

.modal-actions {
  display: flex;
  gap: 10px;
  justify-content: flex-end;
  margin-top: 20px;
}

.btn {
  padding: 10px 20px;
  border-radius: var(--radius-sm);
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  transition: all var(--transition);
  font-family: var(--font-sans);
  border: none;
}

.btn-primary {
  background: linear-gradient(135deg, var(--accent), var(--accent-dark));
  color: #fff;
  box-shadow: 0 4px 12px var(--accent-glow);
}

.btn-primary:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 20px var(--accent-glow);
}

.btn-secondary {
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text-secondary);
}

.btn-secondary:hover {
  background: var(--bg-hover);
  color: var(--text-primary);
}

/* ============ Responsive ============ */
@media (max-width: 768px) {
  #sidebar {
    position: fixed;
    left: 0;
    top: 0;
    bottom: 0;
    transform: translateX(-100%);
    z-index: 50;
  }

  #sidebar.mobile-open { transform: translateX(0); }

  #input-bar { padding: 0 12px; height: 80px; min-height: 80px; }

  .example-chips { bottom: 80px; right: 8px; }

  .chip { font-size: 0.7rem; padding: 5px 10px; }

  .modal { padding: 24px; width: 95vw; }

  .step-controls { padding: 6px 12px; gap: 8px; top: 46px; }
  .step-controls .step-desc { max-width: 180px; font-size: 0.7rem; }
  .question-banner { padding: 5px 10px; }
}

/* ============ Scrollbar ============ */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* ============ Math display in viewport ============ */
.math-label {
  position: absolute;
  pointer-events: none;
  font-size: 0.7rem;
  color: var(--text-muted);
  font-family: var(--font-mono);
  white-space: nowrap;
}
</style>
</head>
<body>

<div id="app">
  <!-- ============ Sidebar ============ -->
  <aside id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <div class="icon-wrapper">
          <svg viewBox="0 0 24 24">
            <path d="M8 4h2v16H8zM14 4h2v16h-2zM4 8h2v8H4zM18 8h2v8h-2z"/>
          </svg>
        </div>
        <div>
          <h1>数学可视化<span class="sub">MATHEMATICS LAB</span></h1>
        </div>
      </div>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section-label">可视化模块</div>
      <div class="nav-item active" data-mode="geometry">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
        几何设计
        <span class="badge">3D</span>
      </div>
      <div class="nav-item" data-mode="word-problem">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/><line x1="8" y1="7" x2="16" y2="7"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
        应用题解析
        <span class="badge">2D</span>
      </div>
      <div class="nav-item" data-mode="plane-geometry">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="2"/><line x1="3" y1="12" x2="21" y2="12"/><circle cx="12" cy="12" r="3"/></svg>
        平面几何
        <span class="badge">2D</span>
      </div>
    </nav>

    <div class="sidebar-footer">
      <button class="btn-api" id="btn-api-settings" title="配置 AI API Key">

<!-- ============ Three.js CDN ============ -->
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
/* ================================================================
   MATH VISUALIZATION - 数学可视化
   Mode 1: 3D Geometry (Three.js)
   Mode 2: 2D Word Problem Diagrams (Canvas 2D)
   ================================================================ */

import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ============ DOM Refs ============
const dom = {
  viewport: document.getElementById('viewport'),
  threeCanvas: document.getElementById('three-canvas'),
  twoDCanvas: document.getElementById('two-d-canvas'),
  overlay: document.getElementById('viewport-overlay'),
  emptyPrompt: document.getElementById('empty-prompt'),
  emptyPromptText: document.getElementById('empty-prompt-text'),
  topbarGeometry: document.getElementById('topbar-geometry'),
  chipsGeometry: document.getElementById('chips-geometry'),
  chipsWordProblem: document.getElementById('chips-word-problem'),
  chipsPlaneGeometry: document.getElementById('chips-plane-geometry'),
  stepControls: document.getElementById('step-controls'),
  btnStepPrev: document.getElementById('btn-step-prev'),
  btnStepNext: document.getElementById('btn-step-next'),
  stepInfo: document.getElementById('step-info'),
  stepDesc: document.getElementById('step-desc'),
  questionBanner: document.getElementById('question-banner'),
  qbText: document.getElementById('qb-text'),
  qbBadge: document.getElementById('qb-badge'),
  userInput: document.getElementById('user-input'),
  btnSend: document.getElementById('btn-send'),
  btnClear: document.getElementById('btn-clear-scene'),
  btnResetView: document.getElementById('btn-reset-view'),
  btnTopView: document.getElementById('btn-top-view'),
  btnFrontView: document.getElementById('btn-front-view'),
  btnApi: document.getElementById('btn-api-settings'),
  apiModalOverlay: document.getElementById('api-modal-overlay'),
  apiKeyInput: document.getElementById('api-key-input'),
  apiProvider: document.getElementById('api-provider'),
  formHint: document.getElementById('form-hint'),
  btnModalSave: document.getElementById('btn-modal-save'),
  btnModalCancel: document.getElementById('btn-modal-cancel'),
  apiDot: document.getElementById('api-dot'),
  apiStatusText: document.getElementById('api-status-text'),
  navItems: document.querySelectorAll('.nav-item'),
  allChips: document.querySelectorAll('.chip'),
  toast: document.getElementById('toast'),
  toastIcon: document.getElementById('toast-icon'),
  toastMsg: document.getElementById('toast-msg'),
};

// ============ State ============
let currentMode = 'geometry';
let isGenerating = false;
let current2DSteps = [];
let currentStep = 0;

// ============ Toast ============
let toastTimer;
function showToast(msg, type = 'info') {
  clearTimeout(toastTimer);
  dom.toast.className = `toast ${type}`;
  dom.toastMsg.textContent = msg;
  const icons = { error: '✕', success: '✓', info: '•' };
  dom.toastIcon.textContent = icons[type] || '';
  requestAnimationFrame(() => dom.toast.classList.add('show'));
  toastTimer = setTimeout(() => dom.toast.classList.remove('show'), 3000);
}

// ============ Provider Config ============
const PROVIDERS = {
  zhipu: {
    name: '智谱AI',
    model: 'glm-4-flash',
    endpoint: 'https://open.bigmodel.cn/api/paas/v4/chat/completions',
    registerUrl: 'https://open.bigmodel.cn/',
    registerText: '去智谱AI注册 →',
    desc: 'GLM-4-Flash · 注册送 500万 tokens',
  },
  deepseek: {
    name: 'DeepSeek',
    model: 'deepseek-chat',
    endpoint: 'https://api.deepseek.com/v1/chat/completions',
    registerUrl: 'https://platform.deepseek.com/',
    registerText: '去 DeepSeek 注册 →',
    desc: 'DeepSeek-V3 · 注册送 500万 tokens',
  },
  qwen: {
    name: '千问',
    model: 'qwen-turbo',
    endpoint: 'https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions',
    registerUrl: 'https://dashscope.aliyun.com/',
    registerText: '去阿里云百炼注册 →',
    desc: 'Qwen-Turbo · 注册送 100万 tokens',
  },
};

// ============ API Config Management ============
function getApiConfig() {
  return {
    provider: localStorage.getItem('mathvis_provider') || 'zhipu',
    apiKey: localStorage.getItem('mathvis_api_key') || '',
  };
}
function setApiConfig(provider, apiKey) {
  localStorage.setItem('mathvis_provider', provider);
  localStorage.setItem('mathvis_api_key', apiKey);
  updateApiStatus();
}
function updateApiStatus() {
  const cfg = getApiConfig();
  const hasKey = !!cfg.apiKey;
  dom.apiDot.className = `dot ${hasKey ? 'connected' : ''}`;
  const p = PROVIDERS[cfg.provider] || PROVIDERS.zhipu;
  dom.apiStatusText.textContent = hasKey ? `${p.name} 已就绪` : '未配置 API Key';
}
updateApiStatus();

// ============ Provider hint updater ============
function updateProviderHint(providerId) {
  const p = PROVIDERS[providerId] || PROVIDERS.zhipu;
  dom.formHint.innerHTML = `还没有 Key？<a href="${p.registerUrl}" target="_blank" rel="noopener">${p.registerText}</a>`;
}
dom.apiProvider.addEventListener('change', () => {
  updateProviderHint(dom.apiProvider.value);
});

// ============ Modal ============
dom.btnApi.addEventListener('click', () => {
  const cfg = getApiConfig();
  dom.apiProvider.value = cfg.provider;
  dom.apiKeyInput.value = cfg.apiKey;
  updateProviderHint(cfg.provider);
  dom.apiModalOverlay.classList.add('open');
  dom.apiKeyInput.focus();
});
dom.btnModalCancel.addEventListener('click', () => {
  dom.apiModalOverlay.classList.remove('open');
});
dom.btnModalSave.addEventListener('click', () => {
  const provider = dom.apiProvider.value;
  const key = dom.apiKeyInput.value.trim();
  if (!key) { showToast('请输入 API Key', 'error'); return; }
  setApiConfig(provider, key);
  dom.apiModalOverlay.classList.remove('open');
  const p = PROVIDERS[provider];
  showToast(`${p.name} API Key 已保存`, 'success');
});
dom.apiModalOverlay.addEventListener('click', (e) => {
  if (e.target === dom.apiModalOverlay) dom.apiModalOverlay.classList.remove('open');
});

// ============ Mode Switching ============
function switchMode(mode) {
  currentMode = mode;
  dom.navItems.forEach(i => {
    i.classList.toggle('active', i.dataset.mode === mode);
  });

  const isGeometry = mode === 'geometry';
  const is2D = mode === 'word-problem' || mode === 'plane-geometry';
  dom.threeCanvas.classList.toggle('hidden-canvas', !isGeometry);
  dom.twoDCanvas.classList.toggle('hidden-canvas', isGeometry);
  dom.topbarGeometry.classList.toggle('hidden-canvas', !isGeometry);
  dom.chipsGeometry.classList.toggle('hidden-canvas', !isGeometry);
  dom.chipsWordProblem.classList.toggle('hidden-canvas', mode !== 'word-problem');
  dom.chipsPlaneGeometry.classList.toggle('hidden-canvas', mode !== 'plane-geometry');
  dom.stepControls.classList.toggle('hidden-canvas', isGeometry);
  dom.questionBanner.classList.toggle('hidden-canvas', isGeometry);

  if (isGeometry) {
    dom.emptyPromptText.innerHTML = '在底部输入框中描述数学问题<br>AI 将自动生成 3D 可视化场景';
    dom.userInput.placeholder = '描述你想看到的数学场景，例如：一个底面半径3厘米、高5厘米的圆柱体...';
    renderer.setAnimationLoop(animate3D);
  } else if (mode === 'plane-geometry') {
    dom.emptyPromptText.innerHTML = '输入平面几何题<br>AI 会用图形展示周长和面积的计算过程';
    dom.userInput.placeholder = '例如：一个长8厘米、宽5厘米的长方形，它的周长和面积分别是多少？';
    dom.qbBadge.textContent = '平面几何';
    // Keep existing question if any, else show hint
    if (!dom.qbText.textContent) dom.qbText.textContent = '选择右侧示例或输入题目';
    renderer.setAnimationLoop(null);
    clear2DScene();
    current2DSteps = [];
    currentStep = 0;
    updateStepUI();
  } else {
    dom.emptyPromptText.innerHTML = '输入一道应用题<br>AI 会用图形逐步解释解题过程';
    dom.userInput.placeholder = '输入应用题，例如：想要剪出8个手拉手的小人，需要将彩纸对折几次？';
    dom.qbBadge.textContent = '应用题';
    if (!dom.qbText.textContent) dom.qbText.textContent = '选择右侧示例或输入题目';
    renderer.setAnimationLoop(null);
    clear2DScene();
    current2DSteps = [];
    currentStep = 0;
    updateStepUI();
  }

  dom.emptyPrompt.classList.remove('hidden');
}

dom.navItems.forEach(item => {
  item.addEventListener('click', () => switchMode(item.dataset.mode));
});

// ================================================================
//  MODE 1: 3D GEOMETRY (THREE.JS)
// ================================================================

const viewport = dom.viewport;
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xf0f2f5);

// Camera
const camera = new THREE.PerspectiveCamera(
  50, viewport.clientWidth / viewport.clientHeight, 0.1, 100
);
camera.position.set(8, 6, 10);
camera.lookAt(0, 0, 0);

// Renderer
const renderer = new THREE.WebGLRenderer({
  canvas: dom.threeCanvas,
  antialias: true,
  alpha: true,
});
renderer.setSize(viewport.clientWidth, viewport.clientHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;

// Lights
const ambientLight = new THREE.AmbientLight(0xd0d8e8, 2.5);
scene.add(ambientLight);
const keyLight = new THREE.DirectionalLight(0xffffff, 4);
keyLight.position.set(10, 15, 10);
keyLight.castShadow = true;
keyLight.shadow.mapSize.set(2048, 2048);
keyLight.shadow.camera.near = 0.1;
keyLight.shadow.camera.far = 50;
keyLight.shadow.camera.left = -15;
keyLight.shadow.camera.right = 15;
keyLight.shadow.camera.top = 15;
keyLight.shadow.camera.bottom = -15;
keyLight.shadow.bias = -0.0001;
scene.add(keyLight);
const fillLight = new THREE.DirectionalLight(0x8899cc, 1.5);
fillLight.position.set(-5, 3, -5);
scene.add(fillLight);

// Grid
const gridHelper = new THREE.GridHelper(16, 16, 0xccd0d8, 0xe8ebf0);
gridHelper.position.y = -5;
scene.add(gridHelper);
const groundGeo = new THREE.PlaneGeometry(16, 16);
const groundMat = new THREE.ShadowMaterial({ opacity: 0.15 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -5;
ground.receiveShadow = true;
scene.add(ground);
const axesHelper = new THREE.AxesHelper(6);
scene.add(axesHelper);

// OrbitControls
const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 3;
controls.maxDistance = 25;
controls.maxPolarAngle = Math.PI * 0.75;
controls.update();

let userObjects = [];
function clear3DScene() {
  userObjects.forEach(obj => {
    if (obj) {
      scene.remove(obj);
      if (obj.geometry) obj.geometry.dispose();
      if (obj.material) {
        if (Array.isArray(obj.material)) {
          obj.material.forEach(m => m.dispose());
        } else { obj.material.dispose(); }
      }
    }
  });
  userObjects = [];
}
function addUserObject(obj) {
  scene.add(obj);
  userObjects.push(obj);
}

// Expose 3D globals for AI-generated code (CSP-safe blob execution)
window._scene = scene;
window._camera = camera;
window._renderer = renderer;
window._controls = controls;
window._THREE = THREE;
window._addUserObject = addUserObject;

function clearScene() {
  if (currentMode === 'geometry') {
    clear3DScene();
  } else {
    clear2DScene();
  }
  dom.emptyPrompt.classList.remove('hidden');
}

function animate3D() {
  controls.update();
  renderer.render(scene, camera);
}
renderer.setAnimationLoop(animate3D);

// Viewport controls
function resetView() {
  camera.position.set(8, 6, 10);
  controls.target.set(0, 0, 0);
  controls.update();
}
function topView() {
  camera.position.set(0, 12, 0.1);
  controls.target.set(0, 0, 0);
  controls.update();
}
function frontView() {
  camera.position.set(0, 0, 12);
  controls.target.set(0, 0, 0);
  controls.update();
}
dom.btnResetView.addEventListener('click', resetView);
dom.btnTopView.addEventListener('click', topView);
dom.btnFrontView.addEventListener('click', frontView);
dom.btnClear.addEventListener('click', clearScene);

// Resize handler
window.addEventListener('resize', () => {
  const w = viewport.clientWidth;
  const h = viewport.clientHeight;
  if (currentMode === 'geometry') {
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
  } else {
    setup2DCanvas();
    drawCurrentStep();
  }
});

// ================================================================
//  MODE 2: 2D WORD PROBLEM DIAGRAMS (CANVAS 2D)
// ================================================================

let ctx2d, W2, H2;

function setup2DCanvas() {
  const rect = dom.twoDCanvas.parentElement.getBoundingClientRect();
  W2 = rect.width;
  H2 = rect.height;
  dom.twoDCanvas.width = W2 * Math.min(window.devicePixelRatio, 2);
  dom.twoDCanvas.height = H2 * Math.min(window.devicePixelRatio, 2);
  dom.twoDCanvas.style.width = W2 + 'px';
  dom.twoDCanvas.style.height = H2 + 'px';
  ctx2d = dom.twoDCanvas.getContext('2d');
  ctx2d.scale(Math.min(window.devicePixelRatio, 2), Math.min(window.devicePixelRatio, 2));
}
setup2DCanvas();

function clear2DScene() {
  ctx2d.clearRect(0, 0, W2, H2);
  current2DSteps = [];
  currentStep = 0;
  updateStepUI();
}

// Step navigation
function updateStepUI() {
  const total = current2DSteps.length;
  dom.stepControls.classList.toggle('hidden-canvas', total === 0);
  if (total === 0) return;
  dom.stepInfo.textContent = `${currentStep + 1} / ${total}`;
  const step = current2DSteps[currentStep];
  dom.stepDesc.textContent = step?.desc || '';
  dom.btnStepPrev.disabled = currentStep <= 0;
  dom.btnStepNext.disabled = currentStep >= total - 1;
}

function drawCurrentStep() {
  if (!current2DSteps.length) return;
  ctx2d.clearRect(0, 0, W2, H2);
  // Draw light grid background
  ctx2d.strokeStyle = '#e8ebf0';
  ctx2d.lineWidth = 1;
  for (let x = 0; x < W2; x += 40) {
    ctx2d.beginPath(); ctx2d.moveTo(x, 0); ctx2d.lineTo(x, H2); ctx2d.stroke();
  }
  for (let y = 0; y < H2; y += 40) {
    ctx2d.beginPath(); ctx2d.moveTo(0, y); ctx2d.lineTo(W2, y); ctx2d.stroke();
  }
  // Draw only the current step (not cumulative)
  try {
    current2DSteps[currentStep].draw(ctx2d, W2, H2);
  } catch (err) {
    console.error('Draw error:', err);
    ctx2d.fillStyle = '#e03131';
    ctx2d.font = '16px system-ui';
    ctx2d.textAlign = 'center';
    ctx2d.fillText('绘图错误: ' + err.message, W2 / 2, H2 / 2);
  }
}

dom.btnStepPrev.addEventListener('click', () => {
  if (currentStep > 0) { currentStep--; drawCurrentStep(); updateStepUI(); }
});
dom.btnStepNext.addEventListener('click', () => {
  if (currentStep < current2DSteps.length - 1) { currentStep++; drawCurrentStep(); updateStepUI(); }
});

function show2DSteps(steps, questionText) {
  current2DSteps = steps;
  currentStep = 0;
  if (questionText) {
    dom.qbText.textContent = questionText;
  }
  updateStepUI();
  drawCurrentStep();
}

// ============ 2D Drawing Helpers (exposed to AI-generated code) ============
function drawRoundRect(ctx, x, y, w, h, r, fill, stroke) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
  if (fill) { ctx.fillStyle = fill; ctx.fill(); }
  if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = 2; ctx.stroke(); }
}

function drawArrow(ctx, x1, y1, x2, y2, color) {
  const dx = x2 - x1, dy = y2 - y1;
  const len = Math.sqrt(dx * dx + dy * dy);
  const ux = dx / len, uy = dy / len;
  ctx.strokeStyle = color || '#4c6ef5';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();
  // Arrowhead
  const ax = x2 - ux * 10 + uy * 6, ay = y2 - uy * 10 - ux * 6;
  const bx = x2 - ux * 10 - uy * 6, by = y2 - uy * 10 + ux * 6;
  ctx.fillStyle = color || '#4c6ef5';
  ctx.beginPath();
  ctx.moveTo(x2, y2); ctx.lineTo(ax, ay); ctx.lineTo(bx, by);
  ctx.fill();
}

function drawCenteredText(ctx, text, x, y, font, color) {
  ctx.fillStyle = color || '#1a1d26';
  ctx.font = font || '16px system-ui';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, x, y);
}

async function callAI(userMessage) {
  const cfg = getApiConfig();
  const provider = PROVIDERS[cfg.provider] || PROVIDERS.zhipu;
  if (!cfg.apiKey) {
    showToast('请先配置 API Key', 'error');
    dom.btnApi.click();
    return null;
  }
  const controller = new AbortController();
  const timeoutId = setTimeout(() => controller.abort(), 60000);
  try {
    const response = await fetch(provider.endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${cfg.apiKey}` },
      body: JSON.stringify({
        model: provider.model,
        messages: [
          { role: 'system', content: getSystemPrompt() },
          { role: 'user', content: buildPrompt(userMessage) },
        ],
        temperature: 0.3,
        max_tokens: 4096,
        top_p: 0.9,
      }),
      signal: controller.signal,
    });
    clearTimeout(timeoutId);
    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      const errMsg = err.error?.message || err.error?.code || '';
      if (response.status === 401 || response.status === 403) throw new Error('API Key 无效，请重新配置');
      if (response.status === 429) throw new Error('请求太频繁，请稍后再试');
      if (/insufficient|balance|余额|欠费|quota/i.test(errMsg)) {
        const p = PROVIDERS[cfg.provider];
        throw new Error(`${p.name} 账户余额不足，请充值或切换到其他 AI 服务商（左侧 API 设置）`);
      }
      throw new Error(errMsg || `API 请求失败 (${response.status})`);
    }
    const data = await response.json();
    const content = data.choices?.[0]?.message?.content;
    if (!content) throw new Error('AI 未返回有效内容');
    return content;
  } catch (err) {
    clearTimeout(timeoutId);
    if (err.name === 'AbortError') throw new Error('AI 响应超时 (60秒)');
    throw err;
  }
}

// ============ Code Extraction ============
function extractCode(text) {
  const blockMatch = text.match(/```(?:javascript|js)\s*\n?([\s\S]*?)```/);
  if (blockMatch) return blockMatch[1].trim();
  const genericMatch = text.match(/```\s*\n?([\s\S]*?)```/);
  if (genericMatch) return genericMatch[1].trim();
  return text.trim();
}

// ============ CSP-Safe Code Execution ============
// Use dynamic import() with Blob URLs — bypasses script-src restrictions
async function execute3DCode(code) {
  const wrapped = `export default function(scene,camera,renderer,controls,THREE,addUserObject){"use strict";${code};return true}`;
  const blob = new Blob([wrapped], { type: 'text/javascript' });
  const url = URL.createObjectURL(blob);
  try {
    const mod = await import(url);
    URL.revokeObjectURL(url);
    return mod.default(scene, camera, renderer, controls, THREE, addUserObject);
  } catch (e) {
    URL.revokeObjectURL(url);
    throw new Error(`代码执行错误: ${e.message}`);
  }
}

async function execute2DCode(code) {
  const wrapped = `export default function(drawRoundRect,drawCenteredText,drawArrow,W2,H2){"use strict";return ${code}}`;
  const blob = new Blob([wrapped], { type: 'text/javascript' });
  const url = URL.createObjectURL(blob);
  try {
    const mod = await import(url);
    URL.revokeObjectURL(url);
    const steps = mod.default(drawRoundRect, drawCenteredText, drawArrow, W2, H2);
    if (!Array.isArray(steps)) throw new Error('不是有效的步骤数组');
    return steps;
  } catch (e) {
    URL.revokeObjectURL(url);
    throw new Error(`步骤解析错误: ${e.message}`);
  }
}

// ============ Handle Generation ============
async function handleGenerate(userMessage) {
  if (isGenerating) return;
  if (!userMessage.trim()) return;

  setLoading(true);
  try {
    const aiResponse = await callAI(userMessage);
    if (!aiResponse) { setLoading(false); return; }

    const code = extractCode(aiResponse);
    if (!code) throw new Error('未能从 AI 响应中提取代码');

    if (currentMode === 'geometry') {
      clear3DScene();
      await execute3DCode(code);
      showToast('3D 场景生成成功！拖拽鼠标旋转查看', 'success');
    } else {
      clear2DScene();
      setup2DCanvas();
      // Expose W2, H2 globally for blob script
      window._W2 = W2; window._H2 = H2;
      const steps = await execute2DCode(code);
      show2DSteps(steps, userMessage);
      dom.emptyPrompt.classList.add('hidden');
      showToast('图解生成成功！点击下方按钮翻页查看', 'success');
    }
  } catch (err) {
    console.error('Generation error:', err);
    showToast(err.message, 'error');
    dom.emptyPrompt.classList.remove('hidden');
  } finally {
    setLoading(false);
  }
}

// ============ Chip Click Handlers ============
dom.allChips.forEach(chip => {
  chip.addEventListener('click', async () => {
    const exampleName = chip.dataset.example;
    if (!exampleName) return;
    if (isGenerating) return;

    if (currentMode === 'geometry') {
      const example = GEOMETRY_EXAMPLES[exampleName];
      if (!example) return;
      clear3DScene();
      try {
        example.fn();
        showToast(`已加载：${chip.textContent}`, 'info');
      } catch (err) {
        showToast(`加载失败: ${err.message}`, 'error');
      }
    } else if (currentMode === 'plane-geometry') {
      const steps = PLANE_GEOMETRY_EXAMPLES[exampleName];
      if (!steps) return;
      clear2DScene();
      setup2DCanvas();
      show2DSteps(steps, chip.textContent);
      dom.emptyPrompt.classList.add('hidden');
      showToast(`已加载：${chip.textContent}`, 'info');
    } else {
      const example = WORD_PROBLEM_EXAMPLES[exampleName];
      if (!example) return;
      clear2DScene();
      setup2DCanvas();
      show2DSteps(example, example[0]?.desc || chip.textContent);
      dom.emptyPrompt.classList.add('hidden');
      showToast(`已加载：${chip.textContent}`, 'info');
    }
  });
});

// ============ Keyboard Shortcuts ============
window.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;
  switch (e.key.toLowerCase()) {
    case 'r': if (currentMode === 'geometry') resetView(); break;
    case 't': if (currentMode === 'geometry') topView(); break;
    case 'f': if (currentMode === 'geometry') frontView(); break;
    case 'c': clearScene(); break;
    case 'arrowleft': if (!isGeometry && currentStep > 0) { currentStep--; drawCurrentStep(); updateStepUI(); } break;
    case 'arrowright': if (!isGeometry && currentStep < current2DSteps.length - 1) { currentStep++; drawCurrentStep(); updateStepUI(); } break;
  }
});
