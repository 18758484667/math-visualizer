<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数学可视化 - 具象理解数学之美</title>
<style>
/* ============ CSS Variables & Reset ============ */
:root {
  --bg-page: #f0f2f5;
  --bg-panel: #ffffff;
  --bg-card: #f7f8fa;
  --bg-hover: #eef0f5;
  --border: #e0e3e8;
  --border-active: #4c6ef5;
  --text-primary: #1a1d26;
  --text-secondary: #5a6070;
  --text-muted: #9ca3af;
  --accent: #4c6ef5;
  --accent-glow: rgba(76, 110, 245, 0.25);
  --accent-light: #748ffc;
  --accent-dark: #364fc7;
  --accent-bg: rgba(76, 110, 245, 0.08);
  --cyan: #0ca5b0;
  --cyan-bg: rgba(12, 165, 176, 0.08);
  --green: #2b9e44;
  --green-bg: rgba(43, 158, 68, 0.1);
  --red: #e03131;
  --red-bg: rgba(224, 49, 49, 0.08);
  --radius: 12px;
  --radius-sm: 8px;
  --radius-lg: 16px;
  --transition: 200ms ease;
  --font-mono: 'Cascadia Code', 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
  --font-sans: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
  --shadow-lg: 0 12px 32px rgba(0,0,0,0.1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-sans);
  background: var(--bg-page);
  color: var(--text-primary);
  overflow: hidden;
  height: 100vh;
  width: 100vw;
  user-select: none;
}

/* ============ Layout ============ */
#app {
  display: flex;
  height: 100vh;
  width: 100vw;
}

/* ============ Sidebar ============ */
#sidebar {
  width: 280px;
  min-width: 280px;
  background: var(--bg-panel);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  z-index: 10;
  transition: transform var(--transition);
}

.sidebar-header {
  padding: 28px 24px 20px;
  border-bottom: 1px solid var(--border);
}

.sidebar-logo {
  display: flex;
  align-items: center;
  gap: 12px;
}

.sidebar-logo .icon-wrapper {
  width: 42px;
  height: 42px;
  background: linear-gradient(135deg, var(--accent), var(--accent-dark));
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 16px var(--accent-glow);
}

.sidebar-logo svg {
  width: 24px;
  height: 24px;
  fill: none;
  stroke: #fff;
  stroke-width: 2;
}

.sidebar-logo h1 {
  font-size: 1.15rem;
  font-weight: 700;
  letter-spacing: -0.01em;
  color: var(--text-primary);
}

.sidebar-logo span.sub {
  display: block;
  font-size: 0.7rem;
  font-weight: 400;
  color: var(--text-muted);
  margin-top: 1px;
}

.sidebar-nav {
  flex: 1;
  padding: 16px 12px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.nav-section-label {
  font-size: 0.68rem;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  padding: 12px 12px 6px;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all var(--transition);
  color: var(--text-secondary);
  font-size: 0.9rem;
  font-weight: 500;
  position: relative;
}

.nav-item:hover {
  background: var(--bg-hover);
  color: var(--text-primary);
}

.nav-item.active {
  background: var(--accent-bg);
  color: var(--accent);
  box-shadow: inset 0 0 0 1px rgba(76, 110, 245, 0.15);
}

.nav-item.active::before {
  content: '';
  position: absolute;
  left: 0;
  top: 50%;
  transform: translateY(-50%);
  width: 3px;
  height: 20px;
  background: var(--accent);
  border-radius: 0 3px 3px 0;
}

.nav-item svg {
  width: 18px;
  height: 18px;
  flex-shrink: 0;
}

.nav-item .badge {
  margin-left: auto;
  font-size: 0.65rem;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 10px;
  background: var(--accent-bg);
  color: var(--accent);
}

.sidebar-footer {
  padding: 16px 24px;
  border-top: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.btn-api {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 10px 16px;
  border-radius: var(--radius-sm);
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  font-size: 0.82rem;
  cursor: pointer;
  transition: all var(--transition);
  font-family: var(--font-sans);
}

.btn-api:hover {
  background: var(--bg-hover);
  border-color: var(--accent);
  color: var(--accent);
}

.btn-api svg {
  width: 16px;
  height: 16px;
}

.api-status {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 0.7rem;
  color: var(--text-muted);
}

.api-status .dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--text-muted);
}

.api-status .dot.connected {
  background: var(--green);
  box-shadow: 0 0 8px rgba(43, 158, 68, 0.4);
}

/* ============ Main Area ============ */
#main-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  position: relative;
  min-width: 0;
}

/* ============ Viewport ============ */
#viewport {
  flex: 1;
  position: relative;
  background: linear-gradient(135deg, #f8f9fc 0%, #edf0f7 50%, #f0f3fa 100%);
  cursor: grab;
  overflow: hidden;
}

#viewport:active { cursor: grabbing; }
#viewport.grabbing { cursor: grabbing; }

#three-canvas {
  display: block;
  width: 100%;
  height: 100%;
}

#two-d-canvas {
  display: block;
  width: 100%;
  height: 100%;
}

.hidden-canvas { display: none !important; }

.viewport-overlay {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  pointer-events: none;
  opacity: 0;
  transition: opacity 300ms ease;
  z-index: 20;
}

.viewport-overlay.visible {
  opacity: 1;
  pointer-events: auto;
}

.overlay-bg {
  position: absolute;
  inset: 0;
  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(4px);
}

.overlay-content {
  position: relative;
  z-index: 1;
  text-align: center;
}

.loader-spinner {
  width: 48px;
  height: 48px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 16px;
}

@keyframes spin { to { transform: rotate(360deg); } }

.loader-text {
  font-size: 0.9rem;
  color: var(--text-secondary);
  animation: pulse 2s ease infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 0.6; }
  50% { opacity: 1; }
}

/* Empty state prompt */
.empty-prompt {
  position: absolute;
  bottom: 120px;
  left: 50%;
  transform: translateX(-50%);
  text-align: center;
  pointer-events: none;
  transition: opacity 400ms ease;
  z-index: 5;
}

.empty-prompt.hidden { opacity: 0; }

.empty-prompt .big-icon {
  font-size: 3rem;
  margin-bottom: 12px;
  opacity: 0.4;
}

.empty-prompt p {
  font-size: 0.85rem;
  color: var(--text-muted);
  line-height: 1.6;
  max-width: 320px;
}

/* Viewport top bar */
.viewport-topbar {
  position: absolute;
  top: 16px;
  right: 16px;
  display: flex;
  gap: 8px;
  z-index: 15;
}

.vp-btn {
  width: 36px;
  height: 36px;
  border-radius: var(--radius-sm);
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(10px);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition);
  box-shadow: var(--shadow-sm);
}

.vp-btn:hover {
  background: #fff;
  border-color: var(--accent);
  color: var(--accent);
  box-shadow: var(--shadow-md);
}

.vp-btn svg {
  width: 16px;
  height: 16px;
}

/* Example chips */
.example-chips {
  position: absolute;
  bottom: 16px;
  right: 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  z-index: 5;
}

.chip-label {
  font-size: 0.65rem;
  font-weight: 600;
  color: var(--text-muted);
  text-align: right;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

.chip {
  padding: 6px 14px;
  border-radius: 20px;
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(10px);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  font-size: 0.75rem;
  cursor: pointer;
  transition: all var(--transition);
  font-family: var(--font-sans);
  text-align: right;
  white-space: nowrap;
  box-shadow: var(--shadow-sm);
}

.chip:hover {
  background: #fff;
  border-color: var(--accent);
  color: var(--accent);
  transform: translateX(-4px);
  box-shadow: var(--shadow-md);
}

/* ============ Question Banner ============ */
.question-banner {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  z-index: 14;
  background: linear-gradient(135deg, #eef1ff 0%, #f0f3ff 100%);
  border-bottom: 1px solid var(--border);
  padding: 10px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  pointer-events: none;
}
.question-banner .qb-icon { font-size: 1.2rem; flex-shrink: 0; }
.question-banner .qb-text { font-size: 0.9rem; font-weight: 600; color: var(--text-primary); flex: 1; }
.question-banner .qb-badge {
  font-size: 0.65rem; padding: 3px 10px; border-radius: 10px;
  background: var(--accent-bg); color: var(--accent); white-space: nowrap;
}

/* ============ 2D Step Controls ============ */
.step-controls {
  position: absolute;
  top: 52px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  align-items: center;
  gap: 12px;
  z-index: 15;
  background: rgba(255,255,255,0.95);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 8px 16px;
  box-shadow: var(--shadow-sm);
}

.step-controls .step-btn {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: #fff;
  color: var(--text-secondary);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition);
  font-size: 1rem;
}

.step-controls .step-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
}

.step-controls .step-btn:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}

.step-controls .step-info {
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--text-primary);
  min-width: 80px;
  text-align: center;
}

.step-controls .step-desc {
  font-size: 0.8rem;
  color: var(--text-secondary);
  max-width: 300px;
  text-align: center;
}

/* ============ Input Bar ============ */
#input-bar {
  height: 90px;
  min-height: 90px;
  background: var(--bg-panel);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 12px;
  z-index: 10;
}

#input-bar textarea {
  flex: 1;
  height: 46px;
  max-height: 46px;
  padding: 12px 18px;
  border-radius: 24px;
  background: var(--bg-page);
  border: 1px solid var(--border);
  color: var(--text-primary);
  font-size: 0.88rem;
  font-family: var(--font-sans);
  resize: none;
  outline: none;
  transition: all var(--transition);
  line-height: 1.4;
}

#input-bar textarea:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-bg);
}

#input-bar textarea::placeholder {
  color: var(--text-muted);
}

.btn-send {
  width: 46px;
  height: 46px;
  min-width: 46px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--accent-dark));
  border: none;
  color: #fff;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition);
  box-shadow: 0 4px 16px var(--accent-glow);
}

.btn-send:hover {
  transform: scale(1.08);
  box-shadow: 0 6px 24px var(--accent-glow);
}

.btn-send:active {
  transform: scale(0.96);
}

.btn-send:disabled {
  opacity: 0.4;
  cursor: not-allowed;
  transform: none;
  box-shadow: none;
}

.btn-send svg {
  width: 20px;
  height: 20px;
}

.btn-clear {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-muted);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition);
  flex-shrink: 0;
}

.btn-clear:hover {
  border-color: var(--text-muted);
  color: var(--text-secondary);
}

.btn-clear svg {
  width: 16px;
  height: 16px;
}

/* ============ Toast ============ */
.toast {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(-120px);
  padding: 12px 24px;
  border-radius: var(--radius-sm);
  background: var(--bg-panel);
  border: 1px solid var(--border);
  color: var(--text-primary);
  font-size: 0.85rem;
  z-index: 1000;
  transition: transform 300ms cubic-bezier(0.175, 0.885, 0.32, 1.275);
  box-shadow: var(--shadow-lg);
  display: flex;
  align-items: center;
  gap: 10px;
}

.toast.show { transform: translateX(-50%) translateY(0); }

.toast.error { border-color: var(--red); background: var(--red-bg); }
.toast.success { border-color: var(--green); background: var(--green-bg); }
.toast.info { border-color: var(--cyan); background: var(--cyan-bg); }

.toast .toast-icon {
  width: 20px;
  height: 20px;
  flex-shrink: 0;
}

/* ============ Modal ============ */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.3);
  backdrop-filter: blur(6px);
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 300ms ease;
}

.modal-overlay.open {
  opacity: 1;
  pointer-events: auto;
}

.modal {
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 32px;
  width: 460px;
  max-width: 90vw;
  box-shadow: var(--shadow-lg);
  transform: translateY(20px);
  transition: transform 300ms ease;
}

.modal-overlay.open .modal { transform: translateY(0); }

.modal h3 {
  font-size: 1.1rem;
  font-weight: 700;
  margin-bottom: 6px;
}

.modal .desc {
  font-size: 0.82rem;
  color: var(--text-secondary);
  margin-bottom: 20px;
  line-height: 1.5;
}

.form-group {
  margin-bottom: 16px;
}

.form-group label {
  display: block;
  font-size: 0.78rem;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

.form-group select,
.form-group input {
  width: 100%;
  padding: 10px 14px;
  border-radius: var(--radius-sm);
  background: var(--bg-page);
  border: 1px solid var(--border);
  color: var(--text-primary);
  font-size: 0.88rem;
  font-family: var(--font-mono);
  outline: none;
  transition: border-color var(--transition);
}

.form-group select:focus,
.form-group input:focus {
  border-color: var(--accent);
}

.form-group select { font-family: var(--font-sans); }

.form-hint {
  font-size: 0.7rem;
  color: var(--text-muted);
  margin-top: 4px;
}

.form-hint a {
  color: var(--accent);
  text-decoration: none;
}

.form-hint a:hover { text-decoration: underline; }

.modal-actions {
  display: flex;
  gap: 10px;
  justify-content: flex-end;
  margin-top: 20px;
}

.btn {
  padding: 10px 20px;
  border-radius: var(--radius-sm);
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  transition: all var(--transition);
  font-family: var(--font-sans);
  border: none;
}

.btn-primary {
  background: linear-gradient(135deg, var(--accent), var(--accent-dark));
  color: #fff;
  box-shadow: 0 4px 12px var(--accent-glow);
}

.btn-primary:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 20px var(--accent-glow);
}

.btn-secondary {
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text-secondary);
}

.btn-secondary:hover {
  background: var(--bg-hover);
  color: var(--text-primary);
}

/* ============ Responsive ============ */
@media (max-width: 768px) {
  #sidebar {
    position: fixed;
    left: 0;
    top: 0;
    bottom: 0;
    transform: translateX(-100%);
    z-index: 50;
  }

  #sidebar.mobile-open { transform: translateX(0); }

  #input-bar { padding: 0 12px; height: 80px; min-height: 80px; }

  .example-chips { bottom: 80px; right: 8px; }

  .chip { font-size: 0.7rem; padding: 5px 10px; }

  .modal { padding: 24px; width: 95vw; }

  .step-controls { padding: 6px 12px; gap: 8px; top: 46px; }
  .step-controls .step-desc { max-width: 180px; font-size: 0.7rem; }
  .question-banner { padding: 5px 10px; }
}

/* ============ Scrollbar ============ */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* ============ Math display in viewport ============ */
.math-label {
  position: absolute;
  pointer-events: none;
  font-size: 0.7rem;
  color: var(--text-muted);
  font-family: var(--font-mono);
  white-space: nowrap;
}
</style>
</head>
<body>

<div id="app">
  <!-- ============ Sidebar ============ -->
  <aside id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <div class="icon-wrapper">
          <svg viewBox="0 0 24 24">
            <path d="M8 4h2v16H8zM14 4h2v16h-2zM4 8h2v8H4zM18 8h2v8h-2z"/>
          </svg>
        </div>
        <div>
          <h1>数学可视化<span class="sub">MATHEMATICS LAB</span></h1>
        </div>
      </div>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section-label">可视化模块</div>
      <div class="nav-item active" data-mode="geometry">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
        几何设计
        <span class="badge">3D</span>
      </div>
      <div class="nav-item" data-mode="word-problem">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/><line x1="8" y1="7" x2="16" y2="7"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
        应用题解析
        <span class="badge">2D</span>
      </div>
      <div class="nav-item" data-mode="plane-geometry">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="2"/><line x1="3" y1="12" x2="21" y2="12"/><circle cx="12" cy="12" r="3"/></svg>
        平面几何
        <span class="badge">2D</span>
      </div>
    </nav>

    <div class="sidebar-footer">
      <button class="btn-api" id="btn-api-settings" title="配置 AI API Key">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        API 设置
      </button>
      <div class="api-status">
        <span class="dot" id="api-dot"></span>
        <span id="api-status-text">未配置 API Key</span>
      </div>
    </div>
  </aside>

  <!-- ============ Main Area ============ -->
  <div id="main-area">
    <div id="viewport">
      <!-- 3D Canvas (geometry mode) -->
      <canvas id="three-canvas"></canvas>
      <!-- 2D Canvas (word-problem mode) -->
      <canvas id="two-d-canvas" class="hidden-canvas"></canvas>

      <div class="viewport-overlay" id="viewport-overlay">
        <div class="overlay-bg"></div>
        <div class="overlay-content">
          <div class="loader-spinner"></div>
          <div class="loader-text">AI 正在生成可视化...</div>
        </div>
      </div>

      <div class="empty-prompt" id="empty-prompt">
        <div class="big-icon">🔮</div>
        <p id="empty-prompt-text">在底部输入框中描述数学问题<br>AI 将自动生成可视化场景</p>
      </div>

      <!-- Top bar controls -->
      <div class="viewport-topbar" id="topbar-geometry">
        <button class="vp-btn" id="btn-reset-view" title="重置视角">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>
        </button>
        <button class="vp-btn" id="btn-top-view" title="俯视图">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"/><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"/></svg>
        </button>
        <button class="vp-btn" id="btn-front-view" title="前视图">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
        </button>
      </div>

      <!-- Question banner (2D modes only) -->
      <div class="question-banner hidden-canvas" id="question-banner">
        <span class="qb-icon">📝</span>
        <span class="qb-text" id="qb-text"></span>
        <span class="qb-badge" id="qb-badge"></span>
      </div>

      <!-- 2D Step Controls -->
      <div class="step-controls hidden-canvas" id="step-controls">
        <button class="step-btn" id="btn-step-prev" title="上一步">◀</button>
        <span class="step-info" id="step-info">1 / 1</span>
        <button class="step-btn" id="btn-step-next" title="下一步">▶</button>
        <span class="step-desc" id="step-desc"></span>
      </div>

      <!-- Geometry example chips -->
      <div class="example-chips" id="chips-geometry">
        <div class="chip-label">📐 快速示例</div>
        <button class="chip" data-example="cube">正方体体积</button>
        <button class="chip" data-example="cylinder">圆柱体计算</button>
        <button class="chip" data-example="sphere">球体表面积</button>
        <button class="chip" data-example="cone">圆锥体积</button>
        <button class="chip" data-example="water-tank">水池注水问题</button>
        <button class="chip" data-example="parabola">抛物线 3D 曲面</button>
      </div>

      <!-- Word problem example chips -->
      <div class="example-chips hidden-canvas" id="chips-word-problem">
        <div class="chip-label">📝 应用题示例</div>
        <button class="chip" data-example="paper-dolls">剪纸对折问题</button>
        <button class="chip" data-example="chicken-rabbit">鸡兔同笼</button>
        <button class="chip" data-example="age-problem">年龄问题</button>
        <button class="chip" data-example="tree-planting">植树问题</button>
        <button class="chip" data-example="meeting-problem">相遇问题</button>
        <button class="chip" data-example="work-problem">工程问题</button>
      </div>

      <!-- Plane geometry example chips -->
      <div class="example-chips hidden-canvas" id="chips-plane-geometry">
        <div class="chip-label">📏 平面几何示例</div>
        <button class="chip" data-example="rectangle">长方形周长与面积</button>
        <button class="chip" data-example="square">正方形周长与面积</button>
        <button class="chip" data-example="triangle">三角形面积</button>
        <button class="chip" data-example="circle">圆形周长与面积</button>
        <button class="chip" data-example="trapezoid">梯形面积</button>
        <button class="chip" data-example="composite">组合图形面积</button>
      </div>
    </div>

    <!-- Input Bar -->
    <div id="input-bar">
      <button class="btn-clear" id="btn-clear-scene" title="清空场景">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
      </button>
      <textarea
        id="user-input"
        placeholder="描述你想看到的数学场景..."
        rows="1"
      ></textarea>
      <button class="btn-send" id="btn-send" title="生成可视化 (Enter)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>
</div>

<!-- ============ API Modal ============ -->
<div class="modal-overlay" id="api-modal-overlay">
  <div class="modal">
    <h3>⚙️ AI API 配置</h3>
    <p class="desc">
      支持多个 AI 服务商，选择你已注册的平台即可<br>
      智谱 / DeepSeek 注册即送免费额度
    </p>
    <div class="form-group">
      <label>AI 服务商</label>
      <select id="api-provider">
        <option value="zhipu">智谱AI (GLM-4-Flash) · 推荐</option>
        <option value="deepseek">DeepSeek (DeepSeek-V3)</option>
        <option value="qwen">千问 (Qwen-Turbo)</option>
      </select>
    </div>
    <div class="form-group">
      <label>API Key</label>
      <input type="password" id="api-key-input" placeholder="粘贴你的 API Key...">
      <div class="form-hint" id="form-hint">
        还没有 Key？<a href="https://open.bigmodel.cn/" target="_blank" rel="noopener">去智谱AI注册 →</a>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" id="btn-modal-cancel">取消</button>
      <button class="btn btn-primary" id="btn-modal-save">保存配置</button>
    </div>
  </div>
</div>

<!-- Toast container -->
<div class="toast" id="toast">
  <span class="toast-icon" id="toast-icon"></span>
  <span id="toast-msg"></span>
</div>

<script type="module" src="app.js"></script>

</body>
