<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小学数学例题解析 - 分步图形化</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f4f8;--card:#fff;--text:#1a202c;--text2:#4a5568;--text3:#718096;
  --primary:#5a67d8;--primary2:#434190;--accent:#ed8936;--accent2:#c05621;
  --green:#38a169;--red:#e53e3e;--blue:#3182ce;--border:#e2e8f0;
  --shadow:0 2px 8px rgba(0,0,0,.06);--shadow-lg:0 4px 20px rgba(0,0,0,.1);
  --radius:12px;--radius-sm:8px;--transition:.2s ease;
}
body{font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}
.app{display:flex;min-height:100vh}

/* Sidebar */
.sidebar{width:260px;background:#fff;border-right:1px solid var(--border);padding:20px 0;position:fixed;top:0;left:0;bottom:0;overflow-y:auto;z-index:10}
.sidebar-header{padding:0 20px 16px;border-bottom:1px solid var(--border);margin-bottom:8px}
.sidebar-header h1{font-size:18px;color:var(--primary);display:flex;align-items:center;gap:8px}
.sidebar-header h1 span{font-size:12px;color:var(--text3);font-weight:400}
.type-list{list-style:none}
.type-item{padding:12px 20px;cursor:pointer;display:flex;align-items:center;gap:10px;font-size:14px;color:var(--text2);transition:var(--transition);border-left:3px solid transparent}
.type-item:hover{background:#f7fafc;color:var(--text)}
.type-item.active{background:#ebf4ff;color:var(--primary);border-left-color:var(--primary);font-weight:600}
.type-item .icon{font-size:18px;width:28px;text-align:center}

/* Main */
.main{margin-left:260px;flex:1;padding:28px 32px 48px;max-width:960px}

/* Welcome */
.welcome{text-align:center;padding:40px 20px}
.welcome h2{font-size:24px;color:var(--primary);margin-bottom:8px}
.welcome p{color:var(--text3);font-size:15px;margin-bottom:24px}

/* Type Grid */
.type-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:700px;margin:0 auto}
.type-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 12px;cursor:pointer;transition:var(--transition);text-align:center}
.type-card:hover{border-color:var(--primary);box-shadow:var(--shadow-lg);transform:translateY(-2px)}
.type-card .tc-icon{font-size:28px;display:block;margin-bottom:6px}
.type-card .tc-name{font-size:14px;font-weight:600;color:var(--text)}
.type-card .tc-example{font-size:11px;color:var(--text3);margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

@media(max-width:768px){
  .type-grid{grid-template-columns:repeat(2,1fr);gap:8px}
}

/* Content */
.content{display:none}
.content.visible{display:block}

/* Type Header */
.type-header{margin-bottom:24px}
.type-header h2{font-size:22px;display:flex;align-items:center;gap:10px}
.type-header h2 .t-icon{font-size:28px}
.type-header .subtitle{color:var(--text3);font-size:14px;margin-top:4px}

/* Card */
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px;margin-bottom:20px}
.card-title{font-size:16px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px;color:var(--primary)}
.card-title .dot{width:8px;height:8px;border-radius:50%;background:var(--primary)}

/* Question */
.question-box{background:#fefcbf;border-left:4px solid var(--accent);padding:14px 18px;border-radius:0 var(--radius-sm) var(--radius-sm) 0;font-size:15px;line-height:1.7;margin-bottom:20px;font-weight:500}

/* Canvas area */
.canvas-wrap{border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;position:relative;background:#fafbfc}
.canvas-wrap canvas{display:block;width:100%}

/* Step controls */
.step-controls{display:flex;align-items:center;justify-content:center;gap:16px;margin:16px 0}
.step-btn{padding:8px 20px;border:2px solid var(--primary);background:#fff;color:var(--primary);border-radius:20px;cursor:pointer;font-size:14px;font-weight:600;transition:var(--transition)}
.step-btn:hover:not(:disabled){background:var(--primary);color:#fff}
.step-btn:disabled{opacity:.4;cursor:not-allowed}
.step-indicator{font-size:14px;color:var(--text3);min-width:80px;text-align:center}
.step-title{text-align:center;font-size:15px;font-weight:600;color:var(--text);margin-bottom:8px;min-height:22px}
.step-text{background:#f7fafc;padding:14px 18px;border-radius:var(--radius-sm);font-size:14px;line-height:1.7;color:var(--text2);margin-top:12px}

/* Variants */
.variants-tabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.variant-tab{padding:8px 16px;border:2px solid var(--border);background:#fff;border-radius:20px;cursor:pointer;font-size:13px;font-weight:600;color:var(--text2);transition:var(--transition)}
.variant-tab:hover{border-color:var(--accent);color:var(--accent)}
.variant-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.variant-tab .v-hint{font-weight:400;font-size:11px;opacity:.8;margin-left:4px}
.variant-panel{display:none}
.variant-panel.active{display:block}
.variant-header{font-size:15px;font-weight:600;margin-bottom:12px;color:var(--text);display:flex;align-items:center;gap:8px}
.variant-header .v-badge{background:var(--accent);color:#fff;font-size:11px;padding:2px 10px;border-radius:10px}

/* Analysis */
.analysis-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.analysis-col{padding:18px;border-radius:var(--radius-sm)}
.analysis-col.sim{background:#f0fff4;border:1px solid #c6f6d5}
.analysis-col.diff{background:#fff5f5;border:1px solid #fed7d7}
.analysis-col h4{display:flex;align-items:center;gap:6px;font-size:14px;margin-bottom:10px}
.analysis-col.sim h4{color:var(--green)}
.analysis-col.diff h4{color:var(--red)}
.analysis-col li{font-size:13px;line-height:1.7;color:var(--text2);margin-left:16px;margin-bottom:4px}

/* Responsive */
@media(max-width:768px){
  .sidebar{width:100%;position:relative;height:auto;border-right:none;border-bottom:1px solid var(--border);padding:12px 0}
  .sidebar-header{display:none}
  .type-list{display:flex;overflow-x:auto;padding:0 8px;gap:4px}
  .type-item{padding:8px 12px;font-size:12px;white-space:nowrap;border-left:none;border-bottom:2px solid transparent;flex-shrink:0}
  .type-item.active{border-bottom-color:var(--primary)}
  .main{margin-left:0;padding:16px}
  .analysis-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="app">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <h1>📐 例题解析 <span>小学版</span></h1>
    </div>
    <ul class="type-list" id="typeList"></ul>
  </aside>

  <!-- Main -->
  <main class="main">
    <!-- Welcome state -->
    <div class="welcome" id="welcome">
      <h2>📐 小学数学例题解析</h2>
      <p>12 类常考应用题，图形化分步解析 + 变形题对比</p>
      <div class="type-grid" id="typeGrid"></div>
    </div>

    <!-- Content -->
    <div class="content" id="content"></div>
  </main>
</div>

<script>
// ============================================================
// DRAWING UTILITIES
// ============================================================
const U = {
  arrow(c, x1,y1,x2,y2, color='#5a67d8', w=2) {
    c.strokeStyle=color;c.lineWidth=w;c.beginPath();c.moveTo(x1,y1);c.lineTo(x2,y2);c.stroke();
    const a=Math.atan2(y2-y1,x2-x1), L=10;
    c.fillStyle=color;
    c.beginPath();c.moveTo(x2,y2);c.lineTo(x2-L*Math.cos(a-Math.PI/6),y2-L*Math.sin(a-Math.PI/6));c.lineTo(x2-L*Math.cos(a+Math.PI/6),y2-L*Math.sin(a+Math.PI/6));c.closePath();c.fill();
  },
  label(c,x,y,text,color='#1a202c',size=14){
    c.fillStyle=color;c.font=`${size}px "PingFang SC","Microsoft YaHei",sans-serif`;c.textAlign='center';c.textBaseline='middle';c.fillText(text,x,y);
  },
  labelL(c,x,y,text,color='#1a202c',size=14){
    c.fillStyle=color;c.font=`${size}px "PingFang SC","Microsoft YaHei",sans-serif`;c.textAlign='left';c.textBaseline='middle';c.fillText(text,x,y);
  },
  dot(c,x,y,r,color='#e53e3e'){
    c.fillStyle=color;c.beginPath();c.arc(x,y,r,0,Math.PI*2);c.fill();
  },
  rect(c,x,y,w,h,color,alpha=1){
    c.globalAlpha=alpha;c.fillStyle=color;c.fillRect(x,y,w,h);c.globalAlpha=1;
  },
  line(c,x1,y1,x2,y2,color='#cbd5e0',w=1,dash=[]){
    c.strokeStyle=color;c.lineWidth=w;c.setLineDash(dash);c.beginPath();c.moveTo(x1,y1);c.lineTo(x2,y2);c.stroke();c.setLineDash([]);
  },
  clear(c,w,h){
    c.clearRect(0,0,w,h);
    c.fillStyle='#fafbfc';c.fillRect(0,0,w,h);
  }
};

// ============================================================
// PROBLEM DATA — 12 TYPES
// Each type: { id, name, icon, example:{question,steps[{title,text,draw}]}, variants:[{question,hint,steps}], analysis:{similarities:[], differences:[]} }
// ============================================================
const TYPES = [
// ==================== 1. 相遇问题 ====================
{
  id:'meeting', name:'相遇问题', icon:'🚗',
  example:{
    question:'甲、乙两人分别从相距 200 千米的 A、B 两地同时出发，相向而行。甲每小时走 60 千米，乙每小时走 40 千米。两人几小时后相遇？',
    steps:[
      {title:'第①步：画线段图，标出已知条件',
       text:'用一条线段表示 A、B 两地的距离 200 千米。甲从 A 出发向右走，速度 60 km/h；乙从 B 出发向左走，速度 40 km/h。两人同时出发，相向而行。',
       draw(c,w,h){ U.clear(c,w,h);
         U.line(c,60,h/2,w-60,h/2,'#a0aec0',3);
         U.dot(c,60,h/2,7,'#3182ce'); U.label(c,60,h/2-22,'A', '#3182ce',15);
         U.dot(c,w-60,h/2,7,'#e53e3e'); U.label(c,w-60,h/2-22,'B', '#e53e3e',15);
         U.label(c,w/2,h/2-18,'200 km','#4a5568',13);
         U.arrow(c,60,h/2+30,140,h/2+30,'#3182ce',2);
         U.label(c,100,h/2+48,'甲 60 km/h →','#3182ce',12);
         U.arrow(c,w-60,h/2+30,w-140,h/2+30,'#e53e3e',2);
         U.label(c,w-100,h/2+48,'← 乙 40 km/h','#e53e3e',12);
       }},
      {title:'第②步：理解"速度和"概念',
       text:'两人相向而行，每过 1 小时，他们一共走近 60 + 40 = 100 千米。这个 100 km/h 就是"速度和"。他们从相距 200 千米到相遇，需要共同走完 200 千米。',
       draw(c,w,h){ U.clear(c,w,h);
         U.line(c,60,h/2,w-60,h/2,'#a0aec0',3);
         U.dot(c,60,h/2,7,'#3182ce');U.label(c,60,h/2-22,'A','#3182ce',15);
         U.dot(c,w-60,h/2,7,'#e53e3e');U.label(c,w-60,h/2-22,'B','#e53e3e',15);
         // Show velocity addition
         U.rect(c,w/2-80,h/2-80,160,50,'#ebf4ff',1);
         U.label(c,w/2,h/2-65,'60 + 40 = 100 km/h','#5a67d8',16);
         U.label(c,w/2,h/2-42,'速度和','#4a5568',12);
         U.label(c,w/2,h/2-18,'200 km','#4a5568',13);
       }},
      {title:'第③步：列式求解',
       text:'相遇时间 = 总路程 ÷ 速度和 = 200 ÷ (60 + 40) = 200 ÷ 100 = 2（小时）。验证：甲走 60×2=120 km，乙走 40×2=80 km，120+80=200 km ✓',
       draw(c,w,h){ U.clear(c,w,h);
         U.line(c,60,h/2,w-60,h/2,'#a0aec0',3);
         // Meeting point at 60% from A
         const mx=60+(w-120)*0.6;
         U.dot(c,mx,h/2,10,'#38a169');U.label(c,mx,h/2-22,'相遇点','#38a169',13);
         U.line(c,60,h/2,mx,h/2,'#3182ce',3);
         U.label(c,(60+mx)/2,h/2+20,'甲 120 km','#3182ce',12);
         U.line(c,mx,h/2,w-60,h/2,'#e53e3e',3);
         U.label(c,(mx+w-60)/2,h/2+20,'乙 80 km','#e53e3e',12);
         U.label(c,w/2,30,'时间 = 200 ÷ 100 = 2 h','#2d3748',16);
       }}
    ]
  },
  variants:[
    {question:'甲、乙两人从相距 360 千米的两地同时出发，相向而行。甲每小时走 75 千米，乙每小时走 45 千米。几小时后相遇？',
     hint:'数字变化',
     steps:[
       {title:'分析',text:'速度和 = 75+45 = 120 km/h，时间 = 360÷120 = 3 小时。结构完全相同，只是路程和速度数字变了。',
        draw(c,w,h){U.clear(c,w,h);U.line(c,60,h/2,w-60,h/2,'#a0aec0',3);U.dot(c,60,h/2,7,'#3182ce');U.dot(c,w-60,h/2,7,'#e53e3e');U.label(c,w/2,h/2-18,'360 km','#4a5568',13);U.label(c,w/2,40,'速度和 = 75+45 = 120 km/h → 360÷120 = 3 h','#2d3748',15);}},
       {title:'验证',text:'甲走 75×3=225 km，乙走 45×3=135 km，225+135=360 km ✓',
        draw(c,w,h){U.clear(c,w,h);const mx=60+(w-120)*(225/360);U.line(c,60,h/2,w-60,h/2,'#a0aec0',3);U.dot(c,mx,h/2,10,'#38a169');U.line(c,60,h/2,mx,h/2,'#3182ce',3);U.line(c,mx,h/2,w-60,h/2,'#e53e3e',3);U.label(c,(60+mx)/2,h/2+20,'甲 225 km','#3182ce',12);U.label(c,(mx+w-60)/2,h/2+20,'乙 135 km','#e53e3e',12);}}
     ]},
    {question:'甲、乙两人同时从 A、B 两地出发相向而行。甲每分钟走 80 米，乙每分钟走 70 米，6 分钟后相遇。A、B 两地相距多少米？',
     hint:'求总路程',
     steps:[
       {title:'分析',text:'已知速度和与时间，求总路程。这是相遇问题的逆向变形：路程 = 速度和 × 时间。',
        draw(c,w,h){U.clear(c,w,h);U.label(c,w/2,30,'已知：速度和=80+70=150 m/min , 时间=6 min','#2d3748',14);U.label(c,w/2,55,'求：总路程 = ？','#e53e3e',14);U.label(c,w/2,90,'路程 = 150 × 6 = 900 米','#38a169',16);U.line(c,60,h/2+30,w-60,h/2+30,'#a0aec0',3);U.label(c,w/2,h/2+20,'900 m','#4a5568',13);U.dot(c,60,h/2+30,6,'#3182ce');U.dot(c,w-60,h/2+30,6,'#e53e3e');}},
       {title:'关键区别',text='例题是已知路程求时间（路程÷速度和），这道题是已知时间求路程（速度和×时间）。公式变形：时间 = 路程÷速度和 ↔ 路程 = 速度和×时间。',
        draw(c,w,h){U.clear(c,w,h);U.label(c,w/2,h/2-20,'S = V×t','#5a67d8',22);U.label(c,w/2-100,h/2+20,'例题：t = S÷V','#718096',14);U.label(c,w/2+100,h/2+20,'本题：S = V×t','#e53e3e',14);U.arrow(c,w/2-40,h/2,w/2+40,h/2,'#a0aec0',1.5);}}
     ]},
    {question:'甲、乙两人从相距 300 千米的两地相向而行。甲先出发 1 小时，走了 60 千米后乙才出发。乙每小时走 40 千米，甲每小时走 60 千米。乙出发后几小时两人相遇？',
     hint:'不同时出发',
     steps:[
       {title:'分析',text='甲先走 1 小时走了 60 千米，此时两人距离变为 300−60=240 千米。之后两人同时相向而行，变成标准相遇问题。乙出发后时间 = 240÷(60+40) = 2.4 小时。',
        draw(c,w,h){U.clear(c,w,h);U.line(c,60,h/2,w-60,h/2,'#a0aec0',3);U.label(c,w/2,h/2-18,'总路程 300 km','#4a5568',13);
         const mx=60+(w-120)*(60/300);U.line(c,60,h/2,mx,h/2,'#3182ce',3);U.label(c,(60+mx)/2,h/2+20,'甲先走 60 km','#3182ce',11);
         U.line(c,mx,h/2,w-60,h/2,'#cbd5e0',1,[]);U.label(c,(mx+w-60)/2,h/2+40,'剩余 240 km','#38a169',12);U.dot(c,mx,h/2,7,'#ed8936');U.label(c,mx,h/2-22,'1h后','#ed8936',11);}},
       {title:'求解',text='剩余距离 240 km，速度和 = 60+40 = 100 km/h，时间为 2.4 小时。甲总共走了 3.4 小时（60×3.4=204 km），乙走了 2.4 小时（40×2.4=96 km），204+96=300 km ✓',
        draw(c,w,h){U.clear(c,w,h);U.label(c,w/2,30,'t = (300-60) ÷ (60+40) = 2.4 h','#2d3748',15);U.label(c,w/2,60,'甲总时间 3.4 h，乙时间 2.4 h','#718096',13);}}
     ]}
  ],
  analysis:{
    similarities:[
      '核心公式相同：路程 = 速度 × 时间，相遇时间 = 总路程 ÷ 速度和',
      '都使用"速度和"概念：两人相向而行时，速度可以直接相加',
      '都可以用线段图表示两地的距离关系',
      '验证方法相同：各自走的距离之和应等于总路程',
      '三量关系中（路程、速度、时间），知二求一'
    ],
    differences:[
      '变形题1（数字变化）：仅改变具体数值，解题步骤完全不变——最基础的变形',
      '变形题2（求总路程）：已知条件从"路程+速度"变为"速度+时间"，公式变形为 S=V×t，属于逆向思维',
      '变形题3（不同时出发）：增加了时间差，需要先扣除先走的路程，转化为标准相遇模型',
      '由题1→题3，难度逐步递增：从数值替换→公式逆向→条件增减',
      '变形题3需要两步思考（先算剩余路程，再算时间），相比例题多了一个中间环节'
    ]
  }
},

// ==================== 2. 追及问题 ====================
{
  id:'chase', name:'追及问题', icon:'🏃',
  example:{
    question:'小明先出发去学校，每分钟走 60 米。10 分钟后，爸爸发现小明忘带作业，骑车以每分钟 200 米的速度去追。爸爸几分钟能追上小明？',
    steps:[
      {title:'第①步：分析初始差距',
       text:'小明先走了 10 分钟，速度为 60 m/min，所以领先距离 = 60 × 10 = 600 米。爸爸出发时，两人相距 600 米。',
       draw(c,w,h){ U.clear(c,w,h);
         U.line(c,60,h/2,w-60,h/2,'#a0aec0',3);
         // Mark initial gap
         U.dot(c,60,h/2,7,'#3182ce');U.label(c,60,h/2-24,'小明起点','#3182ce',12);
         const first=60+(w-120)*(150/w);U.dot(c,first,h/2,7,'#38a169');U.label(c,first,h/2-24,'小明 10min后','#3182ce',11);
         U.line(c,60,h/2,first,h/2,'#3182ce',3);
         U.label(c,(60+first)/2,h/2+20,'600 m','#e53e3e',13);
         U.dot(c,60,h/2+30,6,'#e53e3e');U.label(c,60,h/2+48,'爸爸起点','#e53e3e',12);
       }},
      {title:'第②步：理解"速度差"概念',
       text:'爸爸每分钟比小明多走 200 − 60 = 140 米。这个 140 m/min 就是"速度差"。每分钟爸爸能追上 140 米。',
       draw(c,w,h){ U.clear(c,w,h);
         U.rect(c,w/2-100,60,200,50,'#fff5f5',1);
         U.label(c,w/2,75,'速度差 = 200 - 60 = 140 m/min','#e53e3e',15);

// Build sidebar + homepage grid
const typeList = document.getElementById('typeList');
const typeGrid = document.getElementById('typeGrid');
TYPES.forEach((t, i) => {
  // Sidebar
  const li = document.createElement('li');
  li.className = 'type-item';
  li.dataset.index = i;
  li.innerHTML = `<span class="icon">${t.icon}</span>${t.name}`;
  li.addEventListener('click', () => selectType(i, li));
  typeList.appendChild(li);
  
  // Homepage grid card
  const card = document.createElement('div');
  card.className = 'type-card';
  card.innerHTML = `<span class="tc-icon">${t.icon}</span><div class="tc-name">${t.name}</div><div class="tc-example">${t.example.question.slice(0,30)}...</div>`;
  card.addEventListener('click', () => {
    const sidebarItem = typeList.querySelectorAll('.type-item')[i];
    selectType(i, sidebarItem);
  });
  typeGrid.appendChild(card);
});

// State
let currentType = -1;
let currentStep = 0;
let currentVariant = 0;
let variantSteps = {}; // variantStep[varIdx] = current step

// Render
function selectType(idx, liEl) {
  document.querySelectorAll('.type-item').forEach(el => el.classList.remove('active'));
  if (liEl) liEl.classList.add('active');
  currentType = idx;
  currentStep = 0;
  currentVariant = 0;
  variantSteps = {};
  document.getElementById('welcome').style.display = 'none';
  const content = document.getElementById('content');
  content.classList.add('visible');
  renderAll();
}

  const t = TYPES[currentType];
  if (!t) return;
  const content = document.getElementById('content');
  try {
  content.innerHTML = `
    <div class="type-header">
      <h2><span class="t-icon">${t.icon}</span>${t.name}</h2>

      <div id="variantPanels">
        ${t.variants.map((v,i)=>`
          <div class="variant-panel${i===0?' active':''}" id="vPanel${i}">
            <div class="variant-header"><span class="v-badge">变形${i+1}</span>${v.question}</div>
            <div class="step-title" id="vStepTitle${i}">${v.steps[0]?.title || ''}</div>
            <div class="canvas-wrap"><canvas id="vCanvas${i}" width="700" height="220"></canvas></div>
            <div class="step-controls">
              <button class="step-btn" onclick="prevVariantStep(${i})">← 上一步</button>
              <span class="step-indicator" id="vStepInd${i}">第 1/${v.steps.length} 步</span>
              <button class="step-btn" onclick="nextVariantStep(${i})">下一步 →</button>
            </div>
            <div class="step-text" id="vStepText${i}">${v.steps[0]?.text || ''}</div>
          </div>
        `).join('')}
      </div>
    </div>

    <!-- Analysis -->
    <div class="card">
      <div class="card-title"><span class="dot" style="background:var(--accent2)"></span>💡 题型分析：相似点 & 不同点</div>
      <div class="analysis-grid">
        <div class="analysis-col sim">
          <h4>✅ 相同点</h4>
          <ol>${t.analysis.similarities.map(s=>`<li>${s}</li>`).join('')}</ol>
        </div>
        <div class="analysis-col diff">
          <h4>❌ 不同点</h4>
          <ol>${t.analysis.differences.map(s=>`<li>${s}</li>`).join('')}</ol>
        </div>
      </div>
    </div>
  `;

  // Initialize variant steps
  t.variants.forEach((_, i) => { variantSteps[i] = 0; });
  
  // Draw
  drawExample();
  t.variants.forEach((_, i) => drawVariant(i));
  } catch (err) {
    content.innerHTML = '<div class="card" style="color:red;padding:20px">❌ 渲染错误: ' + err.message + '<br><small>请按 F12 查看控制台</small></div>';
    console.error('renderAll error:', err);
  }
}

// ---- Example drawing ----
function drawExample() {
  const t = TYPES[currentType];
  if (!t) return;
  const canvas = document.getElementById('exampleCanvas');
  if (!canvas) return;
  const w = canvas.width, h = canvas.height;
  const step = t.example.steps[currentStep];
  document.getElementById('stepTitle').textContent = step.title;
  document.getElementById('stepText').textContent = step.text;
  document.getElementById('stepIndicator').textContent = `第 ${currentStep+1}/${t.example.steps.length} 步`;
  document.getElementById('prevBtn').disabled = currentStep === 0;
  document.getElementById('nextBtn').disabled = currentStep === t.example.steps.length - 1;
  step.draw(canvas.getContext('2d'), w, h);
}

function prevStep() { if(currentStep>0){currentStep--;drawExample();} }
function nextStep() { const t=TYPES[currentType]; if(currentStep<t.example.steps.length-1){currentStep++;drawExample();} }

// ---- Variant drawing ----
function drawVariant(vi) {
  const t = TYPES[currentType];
  if (!t) return;
  const canvas = document.getElementById('vCanvas'+vi);
  if (!canvas) return;
  const w = canvas.width, h = canvas.height;
  const vs = variantSteps[vi] || 0;
  const step = t.variants[vi].steps[vs];
  const stEl=document.getElementById('vStepTitle'+vi);
  const txtEl=document.getElementById('vStepText'+vi);
  const indEl=document.getElementById('vStepInd'+vi);
  if(stEl) stEl.textContent = step.title;
  if(txtEl) txtEl.textContent = step.text;
  if(indEl) indEl.textContent = `第 ${vs+1}/${t.variants[vi].steps.length} 步`;
  step.draw(canvas.getContext('2d'), w, h);
}

function switchVariant(vi) {
  currentVariant = vi;
  document.querySelectorAll('.variant-tab').forEach((el,i)=>el.classList.toggle('active',i===vi));
  document.querySelectorAll('.variant-panel').forEach((el,i)=>el.classList.toggle('active',i===vi));
  if (variantSteps[vi] === undefined) variantSteps[vi] = 0;
  drawVariant(vi);
}

function prevVariantStep(vi) {
  if ((variantSteps[vi]||0) > 0) { variantSteps[vi]--; drawVariant(vi); }
}
function nextVariantStep(vi) {
  const t = TYPES[currentType];
  if ((variantSteps[vi]||0) < t.variants[vi].steps.length - 1) { variantSteps[vi]++; drawVariant(vi); }
}

// Init: show welcome grid (don't auto-select)
</script>
</body>
</html>
